// ===== HELPERS =====
function saveState() {
  localStorage.setItem('nt_cart', JSON.stringify(state.cart));
  localStorage.setItem('nt_wish', JSON.stringify(state.wishlist));
  updateBadges();
}

function updateBadges() {
  const cb = document.getElementById('cart-badge');
  const wb = document.getElementById('wishlist-badge');
  const cartCount = state.cart.reduce((s,i)=>s+i.qty, 0);
  cb.textContent = cartCount; cb.classList.toggle('hidden', cartCount===0);
  wb.textContent = state.wishlist.length; wb.classList.toggle('hidden', state.wishlist.length===0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function stars(rating) {
  let h='';
  for(let i=1;i<=5;i++) h+=`<i data-lucide="star" class="w-4 h-4 inline ${i<=Math.round(rating)?'star-filled fill-current':'star-empty'}"></i>`;
  return h;
}

function addToCart(id) {
  const existing = state.cart.find(i=>i.id===id);
  if(existing) existing.qty++;
  else state.cart.push({id, qty:1});
  saveState(); showToast('Added to cart ✓');
}

function toggleWishlist(id) {
  const idx = state.wishlist.indexOf(id);
  if(idx>-1) { state.wishlist.splice(idx,1); showToast('Removed from wishlist'); }
  else { state.wishlist.push(id); showToast('Added to wishlist ♥'); }
  saveState(); renderPage();
}

function toggleCompare(id) {
  const idx = state.compare.indexOf(id);
  if(idx>-1) state.compare.splice(idx,1);

  else if(state.compare.length<3) state.compare.push(id);
  else { showToast('Max 3 items to compare'); return; }
  updateCompareBar();
}

function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  const container = document.getElementById('compare-items');
  if(state.compare.length===0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  container.innerHTML = state.compare.map(id=>{
    const p = products.find(x=>x.id===id);
    return `<div class="glass px-3 py-1 rounded-full text-xs flex items-center gap-2">${p.emoji} ${p.name} <button onclick="toggleCompare(${id})" class="text-red-400">×</button></div>`;
  }).join('');

  lucide.createIcons();
}

    case 'product': main.innerHTML = renderProductDetail(); break;
    case 'cart': main.innerHTML = renderCart(); break;
    case 'wishlist': main.innerHTML = renderWishlist(); break;

// ===== PARTICLES =====
function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouse = {x:-1000, y:-1000};
  let w, h;

  function resize() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; }

  resize(); window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });

  for(let i=0;i<50;i++) particles.push({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3, r:Math.random()*2+1 });

  function draw() {
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{
      const dx=mouse.x-p.x, dy=mouse.y-p.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<150) { p.vx-=dx*0.00005; p.vy-=dy*0.00005; }
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w) p.vx*=-1;
      if(p.y<0||p.y>h) p.vy*=-1;
      const alpha = dist<150 ? 0.6 : 0.2;

      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,212,255,${alpha})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ===== CURSOR =====
function initCursor() {
  if(window.innerWidth<768) return;
  const dot=document.getElementById('cursor-dot'), glow=document.getElementById('cursor-glow');
  let cx=0,cy=0,gx=0,gy=0;
  document.addEventListener('mousemove',e=>{ cx=e.clientX; cy=e.clientY; });
  document.addEventListener('mousedown',()=>{ dot.style.transform='scale(0.5)'; setTimeout(()=>dot.style.transform='scale(1)',

150); });

  function update() {
    gx+=(cx-gx)*0.12; gy+=(cy-gy)*0.12;
    dot.style.left=cx-4+'px'; dot.style.top=cy-4+'px';
    glow.style.left=gx-20+'px'; glow.style.top=gy-20+'px';
    requestAnimationFrame(update);
  }
  update();

  document.addEventListener('mouseover',e=>{
    if(e.target.closest('button,a,[onclick]')) { dot.style.transform='scale(2)'; glow.style.width='60px'; glow.style.height='60px'; glow.style.opacity='0.8'; }
  });
  document.addEventListener('mouseout',e=>{

    if(e.target.closest('button,a,[onclick]')) { dot.style.transform='scale(1)'; glow.style.width='40px'; glow.style.height='40px'; glow.style.opacity='1'; }
  });
}
