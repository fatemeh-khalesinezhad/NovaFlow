function renderShop(){
  let filtered=currentCategory==='All'?products:products.filter(p=>p.cat===currentCategory);
  if(searchQuery) filtered=filtered.filter(p=>p.name.toLowerCase().includes(searchQuery.toLowerCase()));
  if(sortBy==='price-asc') filtered.sort((a,b)=>a.price-b.price);

  else if(sortBy==='price-desc') filtered.sort((a,b)=>b.price-a.price);
  else if(sortBy==='rating') filtered.sort((a,b)=>b.rating-a.rating);
  return `
  <section class="px-4 py-8 max-w-7xl mx-auto">
    <h1 class="font-display text-4xl font-bold mb-6 animate-fade-up">Shop</h1>
    <div class="flex flex-col md:flex-row gap-4 mb-8 animate-fade-up stagger-1">

      <select onchange="sortBy=this.value;renderPage()" class="glass rounded-xl px-4 py-3 outline-none text-sm bg-transparent">

        <option value="price-asc" ${sortBy==='price-asc'?'selected':''}>Price: Low to High</option>
        <option value="price-desc" ${sortBy==='price-desc'?'selected':''}>Price: High to Low</option>
        <option value="rating" ${sortBy==='rating'?'selected':''}>Top Rated</option>
      </select>
    </div>
    <div class="flex flex-wrap gap-2 mb-8 animate-fade-up stagger-2">

{currentCategory===c?'bg-neon-blue text-dark-900 font-semibold':'glass hover:bg-white/10'}">${c}</button>`).join('')}

    <p class="text-sm opacity-50 mb-4">${filtered.length} products</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">

text-yellow-400 fill-yellow-400"></i><span class="text-sm">${p.rating}/5</span><span class="text-xs opacity-40">(${Math.floor(Math.random()*500+50)} reviews)</span></div>

        <div class="mt-8 space-y-3 text-sm">
          <div class="flex items-center gap-2 opacity-60"><i data-lucide="truck" 

class="w-4 h-4"></i>Free shipping</div>

let chatOpen=false;

const chatResponses={
  'shipping':['We offer free shipping on orders over $100! Standard delivery takes 3-5 business days.'],
  'return':['Our return policy allows 30-day hassle-free returns on all products in original condition.'],
  'warranty':['All products come with a minimum 2-year manufacturer warranty.'],
  'payment':['We accept all major credit cards, PayPal, and Apple Pay.'],
  'hello':['Hey there! 👋 I\'m Nova, your shopping assistant. How can I help you today?'],
  'hi':['Hello! 👋 Welcome to NovaFlow Store. What can I help you with?'],
  'help':['I can help with: shipping info, returns, warranties, product recommendations, and more!'],
  'recommend':['Check out our featured products! The Nova Pro 16" Laptop and Quantum Phone X are bestsellers.'],
  'default':['I\'m not sure about that. Try asking about shipping, returns, warranties, or product recommendations!']
};
function toggleChat(){
  chatOpen=!chatOpen;
  const el=document.getElementById('chatbot');
  el.classList.toggle('hidden',!chatOpen);
  el.style.display=chatOpen?'flex':'none';
  if(chatOpen&&document.getElementById('chat-messages').children.length===0){
    addBotMsg('Hey! 👋 I\'m Nova, your AI assistant. Ask me about products, shipping, returns, or anything else!');
  }
}
function addBotMsg(msg){
  const d=document.createElement('div');
  d.className='flex gap-2 animate-fade-in';
  d.innerHTML=`<div class="w-6 h-6 rounded-full bg-gradient-to-r from-neon-blue to-neon-purple flex items-center justify-center flex-shrink-0 text-[10px]">N</

div><div class="glass rounded-xl rounded-tl-sm px-3 py-2 text-sm max-w-[80%]">${msg}</div>`;
  document.getElementById('chat-messages').appendChild(d);
  document.getElementById('chat-messages').scrollTop=9999;
}
function sendChat(e){
  e.preventDefault();
  const input=document.getElementById('chat-input');
  const msg=input.value.trim(); if(!msg) return;
  // user msg
  const d=document.createElement('div');
  d.className='flex justify-end animate-fade-in';
  d.innerHTML=`<div class="bg-neon-blue/20 text-neon-blue rounded-xl rounded-tr-sm px-3 py-2 text-sm max-w-[80%]">${msg}</div>`;
  document.getElementById('chat-messages').appendChild(d);

  input.value='';
  // bot reply
  setTimeout(()=>{
    const lower=msg.toLowerCase();
    let reply=chatResponses.default[0];
    for(const[key,vals] of Object.entries(chatResponses)){
      if(key!=='default'&&lower.includes(key)){ reply=vals[0]; break; }
    }
    addBotMsg(reply);
  },600);
}

})();

const defaultConfig = {
  store_name: 'NovaFlow Store',
  hero_title: 'The Future of Tech',
  hero_subtitle: 'Premium devices for the next generation',
  background_color: '#0a0a0f',
  surface_color: '#12121a',
  text_color: '#ffffff',
  primary_action_color: '#00d4ff',
  secondary_action_color: '#7c3aed'
};

function getConfig(key, fallback){ return (window.elementSdk?.config?.[key]) || fallback; }

function applyConfig(config){
  document.getElementById('nav-store-name').textContent = config.store_name || defaultConfig.store_name;
  const heroT = document.getElementById('hero-title-el');

  if(heroT) heroT.innerHTML = `<span class="gradient-text">${config.hero_title || defaultConfig.hero_title}</span>`;
  const heroS = document.getElementById('hero-subtitle-el');
  if(heroS) heroS.textContent = config.hero_subtitle || defaultConfig.hero_subtitle;
  // colors
  document.documentElement.style.setProperty('--bg', config.background_color || defaultConfig.background_color);
  document.documentElement.style.setProperty('--primary', config.primary_action_color || defaultConfig.primary_action_color);
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => { applyConfig(config); },
  mapToCapabilities: (config) => ({

    recolorables: [
      { get:()=>config.background_color||defaultConfig.background_color, set:(v)=>{config.background_color=v;window.elementSdk.setConfig({background_color:v});} },
      { get:()=>config.surface_color||defaultConfig.surface_color, set:(v)=>{config.surface_color=v;window.elementSdk.setConfig({surface_color:v});} },
      { get:()=>config.text_color||defaultConfig.text_color, set:(v)=>{config.text_color=v;window.elementSdk.setConfig({text_color:v});} },
      { get:()=>config.primary_action_color||defaultConfig.primary_action_color, set:(v)=>{config.primary_action_color=v;window.elementSdk.setConfig({primary_action_color:v});} },
      { get:()=>config.secondary_action_color||defaultConfig.secondary_action_color, set:(v)=>{config.secondary_action_color=v;window.elementSdk.setConfig({secondary_action_color:v});} }
    ],
    borderables: [],
    fontEditable: { get:()=>config.font_family||'Outfit', set:(v)=>{config.font_family=v;window.elementSdk.setConfig({font_family:v});} },
    fontSizeable: { get:()=>config.font_size||16, set:(v)=>{config.font_size=v;window.elementSdk.setConfig({font_size:v});} }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['store_name', config.store_name || defaultConfig.store_name],
    ['hero_title', config.hero_title || defaultConfig.hero_title],
    ['hero_subtitle', config.hero_subtitle || defaultConfig.hero_subtitle]
  ])
});

updateCounts();

lucide.createIcons();
